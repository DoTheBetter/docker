name: DockerBuild_banban-docker

on:
  push:
    paths:
      - "banban-docker/Dockerfile"
      - "banban-docker/rootfs/**"
  workflow_dispatch:

jobs:
  job1:
    name: buildx tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set env and banner
        run: |
          # 同时设置 shell 变量和写入 GITHUB_ENV
          BANBAN_DOCKER_VER=$(grep -n "BANBAN_DOCKER_VER=" banban-docker/Dockerfile | awk -F= '{print $2}' | head -n1)
          echo "BANBAN_DOCKER_VER=$BANBAN_DOCKER_VER" >> $GITHUB_ENV

          # 设置时区
          sudo timedatectl set-timezone "Asia/Shanghai"

          # 替换 banner 文件中的占位符
          sed -i "s@BANBAN_DOCKER_VER@$BANBAN_DOCKER_VER@" banban-docker/rootfs/etc/s6-overlay/s6-rc.d/init/00-banner
          sed -i "s@DATE_TIME@$(date +"%Y/%m/%d %H:%M")@" banban-docker/rootfs/etc/s6-overlay/s6-rc.d/init/00-banner
          
          # 打印文件内容查看结果
          cat banban-docker/rootfs/etc/s6-overlay/s6-rc.d/init/00-banner
          
      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun Docker Registry
        uses: docker/login-action@v4
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./banban-docker
          file: ./banban-docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            dothebetter/banban-docker:latest
            dothebetter/banban-docker:${{ env.BANBAN_DOCKER_VER }}
            ghcr.io/dothebetter/banban-docker:latest
            ghcr.io/dothebetter/banban-docker:${{ env.BANBAN_DOCKER_VER }}
            registry.cn-hangzhou.aliyuncs.com/dothebetter/banban-docker:latest
            registry.cn-hangzhou.aliyuncs.com/dothebetter/banban-docker:${{ env.BANBAN_DOCKER_VER }}

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: dothebetter/banban-docker
          short-description: banban-docker:${{ env.BANBAN_DOCKER_VER }}，自用斑斑低代码系统Docker镜像，仅支持amd64
          readme-filepath: ./banban-docker/README.md
          enable-url-completion: true
