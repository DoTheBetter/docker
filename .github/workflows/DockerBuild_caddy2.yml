name: DockerBuild_caddy2

on:
  push:
    paths:
    - 'caddy2/Dockerfile'
    - 'caddy2/rootfs/**'
  workflow_dispatch:

jobs:
  job1:
    name: buildx tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set env and banner
        run: |
          # 同时设置 shell 变量和写入 GITHUB_ENV
          CADDY_DOCKER_VER=$(grep -n "CADDY_DOCKER_VER=" caddy2/Dockerfile | awk -F= '{print $2}' | head -n1)
          echo "CADDY_DOCKER_VER=$CADDY_DOCKER_VER" >> $GITHUB_ENV

          # 提取版本号
          CADDY_VER=$(grep -n "CADDY_VER=" caddy2/Dockerfile | awk -F= '{print $2}' | head -n1)

          # 设置时区
          sudo timedatectl set-timezone "Asia/Shanghai"

          # 替换 banner 文件中的占位符
          sed -i "s@CADDY_DOCKER_VER@$CADDY_DOCKER_VER@" caddy2/rootfs/etc/s6-overlay/s6-rc.d/init/00-banner
          sed -i "s@DATE_TIME@$(date +"%Y/%m/%d %H:%M")@" caddy2/rootfs/etc/s6-overlay/s6-rc.d/init/00-banner

          sed -i "s@CADDY_VER@$CADDY_VER@" caddy2/rootfs/etc/s6-overlay/s6-rc.d/init/00-banner.sh

          # 打印文件内容查看结果
          cat caddy2/rootfs/etc/s6-overlay/s6-rc.d/init/00-banner

      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun Docker Registry
        uses: docker/login-action@v4
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./caddy2
          file: ./caddy2/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            dothebetter/caddy2:latest
            dothebetter/caddy2:${{ env.CADDY_VER }}
            ghcr.io/dothebetter/caddy2:latest
            ghcr.io/dothebetter/caddy2:${{ env.CADDY_VER }}
            registry.cn-hangzhou.aliyuncs.com/dothebetter/caddy2:latest
            registry.cn-hangzhou.aliyuncs.com/dothebetter/caddy2:${{ env.CADDY_VER }}

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: dothebetter/caddy2
          short-description: caddy2:${{ env.CADDY_VER }} alpine镜像，支持amd64;arm64v8;arm32v7，集成常用插件及geoipupdate
          readme-filepath: ./caddy2/README.md
          enable-url-completion: true